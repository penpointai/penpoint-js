name: Publish to npm

on:
  push:
    branches:
      - npm

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --include=optional --package-lock=false

      - name: Build and validate package
        run: npm run clean && npm run build && npm test && npm run lint

      - name: Pack npm tarball
        run: npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: "*.tgz"

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: npm-tarball
          path: .

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Debug OIDC claims
        env:
          AUDIENCE: npm:registry.npmjs.org
        run: |
          set -euo pipefail
          TOKEN_JSON="$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}")"
          ID_TOKEN="$(node -e "const j=JSON.parse(process.argv[1]); console.log(j.value)" "$TOKEN_JSON")"
          node -e '
            const t = process.argv[1].split(".")[1];
            const pad = "=".repeat((4 - t.length % 4) % 4);
            const payload = JSON.parse(Buffer.from(t.replace(/-/g,"+").replace(/_/g,"/")+pad, "base64").toString("utf8"));
            console.log(JSON.stringify(payload, null, 2));
          ' "$ID_TOKEN"

      - name: Publish to npm
        run: npm publish *.tgz --access public --provenance
